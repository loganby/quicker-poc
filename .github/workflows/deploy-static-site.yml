name: Deploy Quicker Shoes Static Site

permissions:
  contents: write
  pages: write
  id-token: write

on:
  push:
    branches:
      - main
      - master

jobs:
  publish:
    name: Publish static site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Validate site files
        run: |
          echo "Checking web directory contents..."
          ls -R web
          if [ ! -d "web" ]; then
            echo "web directory not found";
            exit 1;
          fi

      - name: Build preview output
        run: |
          echo "Static site ready in web/"

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web
          publish_branch: gh-pages
          keep_files: false
          commit_message: "Deploy Quicker Shoes static site"

      - name: Confirm deploy
        if: github.event_name == 'push'
        run: |
          echo "Deployment completed successfully."
